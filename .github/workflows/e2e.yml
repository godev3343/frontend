# .github/workflows/e2e.yml
name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    name: Playwright happy-path
    runs-on: ubuntu-latest
    env:
      PNPM_CONFIG_STRICT_DEP_BUILDS: 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers + system deps
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_MAP_STYLE_URL: https://tiles.openfreemap.org/styles/dark
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder

      # Если e2e упал — сохраняем traces/screenshots, чтобы можно было
      # посмотреть в GitHub UI что случилось
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
